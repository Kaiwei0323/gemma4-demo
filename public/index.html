<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventec AI Studio</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <img class="brand__logo" src="/Inventec_Logo.jpg" alt="Inventec" />
          <div class="brand__text">
            <div class="title__main">AI Studio</div>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="chat chat--landing" id="chat">
          <div class="welcome" id="welcome">Welcome to Inventec AI Studio!</div>
          <div class="messages" id="messages"></div>
          <form class="composer" id="composer">
            <div class="composer__bar">
              <div class="textbox">
                <textarea
                  id="text"
                  class="input textarea textbox__input"
                  placeholder="Ask anything"
                  rows="1"
                ></textarea>
                <input id="file" class="textbox__file" type="file" />
                <label class="textbox__attachBtn" for="file" title="Attach file" aria-label="Attach file">
                  <svg viewBox="0 0 24 24" class="textbox__icon" aria-hidden="true">
                    <path
                      fill="currentColor"
                      d="M16.5 6.5v9a4.5 4.5 0 0 1-9 0V6a3 3 0 0 1 6 0v9.5a1.5 1.5 0 0 1-3 0V7.5a1 1 0 1 1 2 0v8a.5.5 0 1 0 1 0V6a2 2 0 1 0-4 0v9.5a2.5 2.5 0 0 0 5 0V6.5a1 1 0 0 1 2 0Z"
                    />
                  </svg>
                </label>
                <button class="textbox__sendBtn" id="sendBtn" type="submit" title="Send" aria-label="Send">
                  <svg viewBox="0 0 24 24" class="textbox__icon" aria-hidden="true">
                    <path
                      fill="currentColor"
                      d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div class="composer__metaRow">
              <div class="filehint" id="fileHint" aria-live="polite"></div>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
