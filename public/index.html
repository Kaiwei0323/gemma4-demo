<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventec AI Studio</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <img class="brand__logo" src="/Inventec_Logo.jpg" alt="Inventec" />
          <div class="brand__text">
            <div class="title__main">AI Studio</div>
          </div>
        </div>
        <div class="header__actions">
          <button class="header__btn" type="button" id="loginBtn" title="Log in" aria-label="Log in">Log in</button>
          <button class="header__btn header__btn--primary" type="button" id="signupBtn" title="Sign up for free" aria-label="Sign up for free">
            Sign up for free
          </button>
          <button class="header__btn" type="button" id="logoutBtn" title="Logout" aria-label="Logout">Logout</button>
        </div>
      </header>

      <main class="main">
        <aside class="sessions" id="sessions" aria-label="Chat sessions">
          <div class="sessions__head">
            <div class="sessions__title">Chats</div>
            <button class="sessions__new" type="button" id="newChatBtn" title="New chat" aria-label="New chat">
              New chat
            </button>
          </div>
          <div class="sessions__list" id="sessionsList" role="list"></div>
        </aside>

        <section class="confirm" id="confirm" aria-hidden="true">
          <div class="confirm__panel" role="dialog" aria-modal="true" aria-label="Confirm">
            <div class="confirm__title" id="confirmTitle">Confirm</div>
            <div class="confirm__body" id="confirmBody">Are you sure?</div>
            <div class="confirm__row">
              <button class="confirm__btn confirm__btn--secondary" type="button" id="confirmCancelBtn">Cancel</button>
              <button class="confirm__btn confirm__btn--danger" type="button" id="confirmOkBtn">Delete</button>
            </div>
          </div>
        </section>

        <section class="authgate" id="authGate" aria-hidden="true">
          <div class="authgate__panel" role="dialog" aria-modal="true" aria-label="Login">
            <div class="authgate__title" id="authTitle">Sign in</div>
            <div class="authgate__subtitle" id="authSubtitle">Sign in or create an account.</div>
            <form class="authgate__form" id="authForm">
              <label class="authgate__label">
                <span>Email</span>
                <input class="authgate__input" id="authUser" autocomplete="username" inputmode="email" />
              </label>
              <label class="authgate__label">
                <span>Password</span>
                <input class="authgate__input" id="authPass" type="password" autocomplete="current-password" />
              </label>
              <div class="authgate__row">
                <button class="authgate__btn" type="submit" id="authLoginBtn">Login</button>
                <button class="authgate__btn authgate__btn--secondary" type="button" id="authRegisterBtn">
                  Register
                </button>
              </div>
              <div class="authgate__hint" id="authHint" aria-live="polite"></div>
            </form>
          </div>
        </section>

        <section class="chat chat--landing" id="chat">
          <div class="welcome" id="welcome">Welcome to Inventec AI Studio!</div>
          <div class="messages" id="messages"></div>
          <form class="composer" id="composer">
            <div class="composer__bar">
              <div class="textbox">
                <textarea
                  id="text"
                  class="input textarea textbox__input"
                  placeholder="Ask anything"
                  rows="1"
                ></textarea>
                <input id="file" class="textbox__file" type="file" />
                <label class="textbox__attachBtn" for="file" title="Attach file" aria-label="Attach file">
                  <svg viewBox="0 0 24 24" class="textbox__icon" aria-hidden="true">
                    <path
                      fill="currentColor"
                      d="M16.5 6.5v9a4.5 4.5 0 0 1-9 0V6a3 3 0 0 1 6 0v9.5a1.5 1.5 0 0 1-3 0V7.5a1 1 0 1 1 2 0v8a.5.5 0 1 0 1 0V6a2 2 0 1 0-4 0v9.5a2.5 2.5 0 0 0 5 0V6.5a1 1 0 0 1 2 0Z"
                    />
                  </svg>
                </label>
                <button class="textbox__sendBtn" id="sendBtn" type="submit" title="Send" aria-label="Send">
                  <svg viewBox="0 0 24 24" class="textbox__icon" aria-hidden="true">
                    <path
                      fill="currentColor"
                      d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div class="composer__metaRow">
              <div class="filehint" id="fileHint" aria-live="polite"></div>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="/app.js"></script>
  </body>
</html>
